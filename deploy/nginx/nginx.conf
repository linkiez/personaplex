upstream moshi_api {
    least_conn;
    server api:3001;
    # Scale horizontally by adding more replicas:
    # server api_2:3001;
    # server api_3:3001;
    keepalive 32;
}

upstream moshi_voice {
    least_conn;
    server moshi-voice:8998;
    keepalive 16;
}

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    # Redirect all HTTP → HTTPS in production; in dev serve directly
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "no-referrer"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 5m;

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://moshi_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 30s;
    }

    # ── WebSocket (Moshi full-duplex audio) ───────────────────────────────────
    location /ws/ {
        limit_req zone=ws_limit burst=5 nodelay;

        proxy_pass         http://moshi_voice/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;    # hold WS connections for up to 1h
        proxy_send_timeout 3600s;
    }

    # ── Health check (bypass rate limit) ─────────────────────────────────────
    location = /health {
        proxy_pass http://moshi_api/health;
        access_log off;
    }

    # ── Static client ─────────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }
}
